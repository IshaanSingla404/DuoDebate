<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="240 100 200 200">
  <!-- Icon card background -->
  <rect x="240" y="100" width="200" height="200" rx="40" fill="#1a1830" />

  <!-- Center divider & diamond -->
  <line x1="340" y1="125" x2="340" y2="265" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  <polygon points="340,165 345,175 340,185 335,175" fill="#ffffff" fill-opacity="0.1" />

  <!-- LEFT figure — purple -->
  <circle cx="294" cy="152" r="11" fill="#7F77DD" />
  <rect x="283" y="167" width="22" height="78" rx="11" fill="#7F77DD" />
  <!-- Left lectern -->
  <polygon points="262,245 262,180 315,245" fill="#534AB7" />
  <!-- Arrow pointing right -->
  <path d="M 312 175 L 328 175 M 322 169 L 328 175 L 322 181" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- RIGHT figure — blue -->
  <circle cx="386" cy="152" r="11" fill="#378ADD" />
  <rect x="375" y="167" width="22" height="78" rx="11" fill="#378ADD" />
  <!-- Right lectern -->
  <polygon points="418,245 418,180 365,245" fill="#185FA5" />
  <!-- Dash on the right -->
  <line x1="400" y1="175" x2="414" y2="175" stroke="#378ADD" stroke-width="2.5" stroke-linecap="round" />

  <!-- Floor -->
  <rect x="262" y="245" width="156" height="4" rx="2" fill="#2e2b50" />
</svg>
